      position: absolute; top: 3px; transition: left 0.2s ease;

    }
    .toggle-track.on .toggle-thumb { left: 27px; }
    .toggle-track.off .toggle-thumb { left: 3px; }

    }
    .mini-toggle.on { background: #6B7F5C; }
    .mini-toggle.off { background: #D4CBBD; }

      position: absolute; top: 2px; transition: left 0.2s ease;

    .mini-toggle.off .mini-toggle-thumb { left: 2px; }

                            <button style={{ padding: '4px 10px', borderRadius: 4, background: '#3D2817', color: '#FAF8F4', fontSize: 10, fontWeight: 600, border: 'none', cursor: 'pointer' }}>{sug.action}</button>
                          </div>
                        ))}
                      </div>
                    )}

                    {editorRightTab === 'comments' && (
                      <div>
                        <div style={{ fontSize: 10, color: '#6B5E4D', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 10 }}>Section comments</div>
                        {[
                          { who: 'Aquila', avatar: 'A', avatarBg: '#3D2817', time: '2026-04-30 11:38', body: 'Cross-referenced this section against three 2024 awarded VAPG narratives. Recommend strengthening the impact quantification in paragraph 4.' },
                          { who: 'Jeffrey P.', avatar: 'JP', avatarBg: '#6B7F5C', time: '2026-04-30 09:14', body: 'Need to verify the 38% batch turnover figure with the equipment vendor before submission.' },
                          { who: 'Aquila', avatar: 'A', avatarBg: '#3D2817', time: '2026-04-29 16:22', body: 'Initial draft generated. Confidence 91%. Flagging Section IV (budget justification) for owner review — Perry Equipment Co. quote needs final pricing confirmation.' },
                        ].map((c, i) => (
                          <div key={i} style={{ display: 'flex', gap: 10, padding: '10px 0', borderBottom: i < 2 ? '1px solid #EDE6D9' : 'none' }}>
                            <div style={{ width: 24, height: 24, borderRadius: 12, background: c.avatarBg, color: '#FAF8F4', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9, fontWeight: 700, flexShrink: 0 }}>{c.avatar}</div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                                <span style={{ fontSize: 11, fontWeight: 600, color: '#1F1A14' }}>{c.who}</span>
                                <span className="tabular-nums" style={{ fontSize: 9, color: '#A09585' }}>{c.time}</span>
                              </div>
                              <div style={{ fontSize: 11, color: '#1F1A14', lineHeight: 1.5, marginTop: 4 }}>{c.body}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {editorRightTab === 'criteria' && (
                      <div>
                        <div style={{ fontSize: 10, color: '#6B5E4D', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 10 }}>Reviewer scoring criteria</div>
                        {[
                          { label: 'Project Impact & Outcomes', weight: 25, status: 'addressed' },
                          { label: 'Business & Marketing Plan Quality', weight: 20, status: 'addressed' },
                          { label: 'Work Plan Feasibility', weight: 20, status: 'partial' },
                          { label: 'Financial Position', weight: 15, status: 'addressed' },
                          { label: 'Project Budget Justification', weight: 10, status: 'partial' },
                          { label: 'Match Funding Commitment', weight: 10, status: 'pending' },
                        ].map((c, i) => (
                          <div key={i} style={{ padding: '10px 0', borderBottom: i < 5 ? '1px solid #EDE6D9' : 'none' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                              <span style={{ fontSize: 11, fontWeight: 500, color: '#1F1A14' }}>{c.label}</span>
                              <span className="tabular-nums" style={{ fontSize: 10, color: '#6B5E4D', fontWeight: 600 }}>{c.weight}%</span>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                              <div style={{ width: 6, height: 6, borderRadius: 3, background: c.status === 'addressed' ? '#5B7A4A' : c.status === 'partial' ? '#C8973F' : '#B85C3A' }} />
                              <span style={{ fontSize: 10, color: '#6B5E4D', textTransform: 'capitalize' }}>{c.status}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── FOOTER ─────────────────────────────────────── */}
          <footer style={{ height: 40, borderTop: '1px solid #EDE6D9', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 32px', background: '#FFFFFF' }}>
            <div style={{ fontSize: 10, color: '#A09585' }}>Built by Neuralogic Group · Single-tenant · Hosted on AWS US-East-1 · SOC 2 Type II Track</div>
            <div style={{ fontSize: 10, color: '#A09585', display: 'flex', alignItems: 'center', gap: 12 }}>
              <span className="tabular-nums">Build version 0.6.0 (LRP) · Last deploy: today</span>
              <span style={{ color: '#C8973F', cursor: 'pointer', fontWeight: 500 }}>Console</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HopeHarmonyADE />);
  </script>
</body>
</html>
